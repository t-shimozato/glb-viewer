<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AKベアリング</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden;
    background: #ffffff url('./gamen_design2.png') no-repeat center center;
    background-size: cover;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    color: #333;
  }

  /* モデル表示エリア (画面全体、背景透過) */
  #viewer-area {
    position: fixed;
    inset: 0;
    z-index: 1;
  }
  #canvas-container {
    position: absolute;
    inset: 0;
  }

  /* テキストエリア (画面の中央左) */
  #text-area {
    position: fixed;
    top: 50%;
    left: 6%;
    transform: translateY(-50%);
    z-index: 5;
    max-width: 480px;
    pointer-events: none;
  }
  #text-area h2 {
    margin: 0 0 28px 0;
    color: #1a1a1a;
    font-size: 56px;
    font-weight: 300;
    letter-spacing: 0.06em;
    line-height: 1.2;
  }
  #text-area p {
    margin: 0;
    color: #555555;
    font-size: 15px;
    line-height: 1.9;
    background: rgba(255, 255, 255, 0.75);
    padding: 12px 16px;
    border-radius: 4px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }

  /* UIパネル (画面左下) */
  #ui {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(255, 255, 255, 0.9);
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid rgba(0, 0, 0, 0.1);
    max-width: 280px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #ui h1 {
    margin: 0 0 4px 0;
    font-size: 14px;
    font-weight: 600;
    color: #333;
  }
  #file-label {
    display: inline-block;
    padding: 6px 12px;
    background: #3a7afe;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    transition: background 0.15s;
    text-align: center;
  }
  #file-label:hover { background: #4a8aff; }
  #file-input { display: none; }
  #status {
    font-size: 12px;
    color: #666;
    min-height: 1em;
    word-break: break-all;
  }

  /* 操作ヘルプ (画面右下) */
  #help {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    background: rgba(255, 255, 255, 0.9);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(0, 0, 0, 0.1);
    font-size: 12px;
    color: #555;
    line-height: 1.6;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  /* レスポンシブ */
  @media (max-width: 768px) {
    #text-area {
      top: 24px;
      left: 24px;
      transform: none;
      max-width: calc(100% - 48px);
    }
    #text-area h2 { font-size: 36px; margin-bottom: 16px; }
    #text-area p { font-size: 13px; line-height: 1.7; }
  }
</style>
</head>
<body>

<!-- モデル表示エリア (画面全体・背景透過、背景画像が透けて見える) -->
<div id="viewer-area">
  <div id="canvas-container"></div>
</div>

<!-- テキスト (画面中央左) -->
<div id="text-area">
  <h2>AKベアリング</h2>
  <p>広い寸法範囲をもつ深溝玉軸受は、転がり軸受の中でも最も多く使用されている形式で、ラジアル荷重と両方向のある程度のアキシアル荷重を同時に受けることができます。高速回転・低騒音・低振動の用途に適しています。</p>
</div>

<!-- UI (画面左下) -->
<div id="ui">
  <h1>GLB ビューアー</h1>
  <label id="file-label" for="file-input">別のGLBファイルを選択</label>
  <input id="file-input" type="file" accept=".glb,.gltf" />
  <div id="status">起動中...</div>
</div>

<!-- 操作ヘルプ (画面右下) -->
<div id="help">
  左ドラッグ: 回転 / 右ドラッグ: 移動 / ホイール: ズーム
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
const statusEl = document.getElementById('status');
const fileInput = document.getElementById('file-input');
const container = document.getElementById('canvas-container');

function setStatus(msg) {
  statusEl.textContent = msg;
  console.log('[GLB Viewer]', msg);
}

function getViewerSize() {
  const rect = container.getBoundingClientRect();
  return { width: rect.width, height: rect.height };
}

setStatus('Three.js を読み込み中...');

let THREE, OrbitControls, GLTFLoader, RGBELoader;
try {
  THREE = await import('three');
  ({ OrbitControls } = await import('three/addons/controls/OrbitControls.js'));
  ({ GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js'));
  ({ RGBELoader } = await import('three/addons/loaders/RGBELoader.js'));
} catch (err) {
  setStatus('ライブラリの読み込みに失敗: ' + err.message);
  throw err;
}

setStatus('シーンを初期化中...');

// --- レンダラー (背景透過、背景画像を透かす) ---
const { width: vw, height: vh } = getViewerSize();
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(vw, vh);
renderer.setClearColor(0xffffff, 0);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
container.appendChild(renderer.domElement);

// --- シーン ---
const scene = new THREE.Scene();
scene.background = null;

// --- カメラ ---
const camera = new THREE.PerspectiveCamera(45, vw / vh, 0.01, 1000);
camera.position.set(2, 2, 3);

// --- ライト ---
scene.add(new THREE.AmbientLight(0xffffff, 0.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// --- 簡易環境マップ (フォールバック) ---
function createSimpleEnvironment() {
  const envScene = new THREE.Scene();
  const geometry = new THREE.SphereGeometry(50, 32, 32);
  const colors = [];
  const positionAttr = geometry.attributes.position;
  const topColor = new THREE.Color(0xffffff);
  const midColor = new THREE.Color(0xb8c8d8);
  const bottomColor = new THREE.Color(0x808080);

  for (let i = 0; i < positionAttr.count; i++) {
    const y = positionAttr.getY(i) / 50;
    let color;
    if (y > 0) color = midColor.clone().lerp(topColor, y);
    else color = midColor.clone().lerp(bottomColor, -y);
    colors.push(color.r, color.g, color.b);
  }
  geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const material = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
  envScene.add(new THREE.Mesh(geometry, material));

  const light1 = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
  light1.position.set(10, 15, 5);
  envScene.add(light1);

  return envScene;
}

// --- 環境マップの読み込み ---
const pmremGenerator = new THREE.PMREMGenerator(renderer);

setStatus('HDR 環境マップを読み込み中...');
new RGBELoader().load(
  './environment.hdr',
  (texture) => {
    texture.mapping = THREE.EquirectangularReflectionMapping;
    const envMap = pmremGenerator.fromEquirectangular(texture).texture;
    scene.environment = envMap;
    texture.dispose();
    pmremGenerator.dispose();
    setStatus('HDR 環境マップ 読み込み完了');
    loadFromUrl('./ball_bearing_arnold.glb', 'ball_bearing_arnold.glb');
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const pct = (xhr.loaded / xhr.total) * 100;
      setStatus('HDR 環境マップを読み込み中... ' + pct.toFixed(0) + '%');
    }
  },
  (err) => {
    console.warn('HDR の読み込みに失敗、簡易環境マップにフォールバックします', err);
    setStatus('HDR 読み込み失敗、簡易環境マップを使用します');
    const envScene = createSimpleEnvironment();
    const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
    scene.environment = envMap;
    pmremGenerator.dispose();
    loadFromUrl('./ball_bearing_arnold.glb', 'ball_bearing_arnold.glb');
  }
);

// --- コントロール ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// --- ローダー ---
const loader = new GLTFLoader();
let currentModel = null;

function clearModel() {
  if (!currentModel) return;
  scene.remove(currentModel);
  currentModel.traverse((obj) => {
    if (obj.isMesh) {
      obj.geometry?.dispose();
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach((m) => m?.dispose?.());
    }
  });
  currentModel = null;
}

function enhanceMaterials(model) {
  let enhancedCount = 0;
  model.traverse((obj) => {
    if (obj.isMesh && obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach((m) => {
        if (m && 'metalness' in m && m.metalness >= 0.1) {
          if (m.metalnessMap) m.metalnessMap = null;
          if (m.roughnessMap) m.roughnessMap = null;
          m.metalness = 1.0;
          m.roughness = 0.3;
          m.needsUpdate = true;
          enhancedCount++;
        }
      });
    }
  });
  console.log('[GLB Viewer] 金属マテリアルを強化: ' + enhancedCount + ' 件');
}

// モデルを画面の右側真ん中に表示
function frameModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  model.position.x -= center.x;
  model.position.y -= center.y;
  model.position.z -= center.z;

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const fov = camera.fov * (Math.PI / 180);
  const distance = (maxDim / 2) / Math.tan(fov / 2) * 1.6;

  // モデルを画面の右側に見せるオフセット
  // カメラとターゲットを同じ量だけ X 方向に動かすことで、視線の向きを保ったまま
  // 画面上のモデルの位置を横にずらせる
  const aspect = camera.aspect;
  // 画面が横長(広い)ほどオフセットを大きく
  const screenOffsetRatio = aspect > 1.5 ? 0.35 : 0.2;
  const offsetX = -maxDim * screenOffsetRatio;

  camera.position.set(distance + offsetX, distance * 0.7, distance);
  camera.near = maxDim / 100;
  camera.far = maxDim * 100;
  camera.updateProjectionMatrix();

  controls.target.set(offsetX, 0, 0);
  controls.update();
}

function loadFromUrl(url, displayName) {
  setStatus(displayName + ' を読み込み中...');
  loader.load(
    url,
    (gltf) => {
      clearModel();
      currentModel = gltf.scene;
      enhanceMaterials(currentModel);
      scene.add(currentModel);
      frameModel(currentModel);
      setStatus('表示中: ' + displayName);
    },
    (xhr) => {
      if (xhr.lengthComputable) {
        const pct = (xhr.loaded / xhr.total) * 100;
        setStatus(displayName + ' を読み込み中... ' + pct.toFixed(0) + '%');
      }
    },
    (err) => {
      console.error(err);
      setStatus('エラー: ' + displayName + ' を読み込めませんでした');
    }
  );
}

function loadFromFile(file) {
  const url = URL.createObjectURL(file);
  setStatus(file.name + ' を読み込み中...');
  loader.load(
    url,
    (gltf) => {
      URL.revokeObjectURL(url);
      clearModel();
      currentModel = gltf.scene;
      enhanceMaterials(currentModel);
      scene.add(currentModel);
      frameModel(currentModel);
      setStatus('表示中: ' + file.name);
    },
    undefined,
    (err) => {
      URL.revokeObjectURL(url);
      console.error(err);
      setStatus('エラー: ' + file.name + ' を読み込めませんでした');
    }
  );
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files?.[0];
  if (file) loadFromFile(file);
});

window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer?.files?.[0];
  if (file && /\.(glb|gltf)$/i.test(file.name)) loadFromFile(file);
});

window.addEventListener('resize', () => {
  const { width, height } = getViewerSize();
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
