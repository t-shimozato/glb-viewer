<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GLB ビューアー</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: #eee;
  }
  #canvas-container { position: fixed; inset: 0; }
  #ui {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
    background: rgba(0, 0, 0, 0.55); padding: 12px 14px;
    border-radius: 8px; max-width: calc(100% - 32px);
  }
  #ui h1 { margin: 0 0 4px 0; font-size: 14px; font-weight: 600; }
  #file-label {
    display: inline-block; padding: 6px 12px;
    background: #3a7afe; color: #fff; border-radius: 4px;
    cursor: pointer; font-size: 13px; user-select: none;
  }
  #file-label:hover { background: #4a8aff; }
  #file-input { display: none; }
  #status { font-size: 12px; color: #bbb; min-height: 1em; word-break: break-all; }
  #help {
    position: fixed; bottom: 16px; right: 16px; z-index: 10;
    background: rgba(0, 0, 0, 0.55); padding: 10px 14px;
    border-radius: 8px; font-size: 12px; color: #ccc; line-height: 1.6;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="ui">
  <h1>GLB ビューアー</h1>
  <label id="file-label" for="file-input">別のGLBファイルを選択</label>
  <input id="file-input" type="file" accept=".glb,.gltf" />
  <div id="status">起動中...</div>
</div>

<div id="help">
  左ドラッグ: 回転 / 右ドラッグ: 移動 / ホイール: ズーム
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
const statusEl = document.getElementById('status');
const fileInput = document.getElementById('file-input');
const container = document.getElementById('canvas-container');

function setStatus(msg) {
  statusEl.textContent = msg;
  console.log('[GLB Viewer]', msg);
}

setStatus('Three.js を読み込み中...');

let THREE, OrbitControls, GLTFLoader, RGBELoader;
try {
  THREE = await import('three');
  ({ OrbitControls } = await import('three/addons/controls/OrbitControls.js'));
  ({ GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js'));
  ({ RGBELoader } = await import('three/addons/loaders/RGBELoader.js'));
} catch (err) {
  setStatus('ライブラリの読み込みに失敗: ' + err.message);
  throw err;
}

setStatus('シーンを初期化中...');

// --- レンダラー ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5; // 露出を上げて全体を明るく
container.appendChild(renderer.domElement);

// --- シーン ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

// --- カメラ ---
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(2, 2, 3);

// --- ライト (環境マップに加えて補助光) ---
scene.add(new THREE.AmbientLight(0xffffff, 0.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// --- 簡易環境マップを作る関数 (HDR読み込み失敗時のフォールバック用) ---
function createSimpleEnvironment() {
  const envScene = new THREE.Scene();
  const geometry = new THREE.SphereGeometry(50, 32, 32);
  const colors = [];
  const positionAttr = geometry.attributes.position;
  const topColor = new THREE.Color(0xffffff);
  const midColor = new THREE.Color(0xb8c8d8);
  const bottomColor = new THREE.Color(0x404858);

  for (let i = 0; i < positionAttr.count; i++) {
    const y = positionAttr.getY(i) / 50;
    let color;
    if (y > 0) color = midColor.clone().lerp(topColor, y);
    else color = midColor.clone().lerp(bottomColor, -y);
    colors.push(color.r, color.g, color.b);
  }
  geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const material = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
  envScene.add(new THREE.Mesh(geometry, material));

  const light1 = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
  light1.position.set(10, 15, 5);
  envScene.add(light1);

  return envScene;
}

// --- 環境マップの読み込み (HDR優先、失敗時はフォールバック) ---
const pmremGenerator = new THREE.PMREMGenerator(renderer);

setStatus('HDR 環境マップを読み込み中...');
new RGBELoader().load(
  './environment.hdr',
  (texture) => {
    texture.mapping = THREE.EquirectangularReflectionMapping;
    const envMap = pmremGenerator.fromEquirectangular(texture).texture;
    scene.environment = envMap;
    texture.dispose();
    pmremGenerator.dispose();
    setStatus('HDR 環境マップ 読み込み完了');
    loadFromUrl('./ball_bearing_arnold.glb', 'ball_bearing_arnold.glb');
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const pct = (xhr.loaded / xhr.total) * 100;
      setStatus('HDR 環境マップを読み込み中... ' + pct.toFixed(0) + '%');
    }
  },
  (err) => {
    console.warn('HDR の読み込みに失敗、簡易環境マップにフォールバックします', err);
    setStatus('HDR 読み込み失敗、簡易環境マップを使用します');
    const envScene = createSimpleEnvironment();
    const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
    scene.environment = envMap;
    pmremGenerator.dispose();
    loadFromUrl('./ball_bearing_arnold.glb', 'ball_bearing_arnold.glb');
  }
);

// --- コントロール ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// --- ローダー ---
const loader = new GLTFLoader();
let currentModel = null;

function clearModel() {
  if (!currentModel) return;
  scene.remove(currentModel);
  currentModel.traverse((obj) => {
    if (obj.isMesh) {
      obj.geometry?.dispose();
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach((m) => m?.dispose?.());
    }
  });
  currentModel = null;
}

// 金属マテリアルの反射を強化する関数 (ほぼ鏡面まで強化)
function enhanceMaterials(model) {
  let enhancedCount = 0;
  model.traverse((obj) => {
    if (obj.isMesh && obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach((m) => {
        // PBR マテリアル(MeshStandardMaterial 系)で少しでも金属っぽければ強化
        if (m && 'metalness' in m && m.metalness >= 0.1) {
          m.metalness = 1.0;
          m.roughness = 0.05; // ほぼ完全な鏡面
          m.needsUpdate = true;
          enhancedCount++;
        }
      });
    }
  });
  console.log('[GLB Viewer] 金属マテリアルを強化: ' + enhancedCount + ' 件');
}

function frameModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  model.position.x -= center.x;
  model.position.y -= center.y;
  model.position.z -= center.z;

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const fov = camera.fov * (Math.PI / 180);
  const distance = (maxDim / 2) / Math.tan(fov / 2) * 1.6;

  camera.position.set(distance, distance * 0.7, distance);
  camera.near = maxDim / 100;
  camera.far = maxDim * 100;
  camera.updateProjectionMatrix();

  controls.target.set(0, 0, 0);
  controls.update();
}

function loadFromUrl(url, displayName) {
  setStatus(displayName + ' を読み込み中...');
  loader.load(
    url,
    (gltf) => {
      clearModel();
      currentModel = gltf.scene;
      enhanceMaterials(currentModel); // 金属の反射を強化
      scene.add(currentModel);
      frameModel(currentModel);
      setStatus('表示中: ' + displayName);
    },
    (xhr) => {
      if (xhr.lengthComputable) {
        const pct = (xhr.loaded / xhr.total) * 100;
        setStatus(displayName + ' を読み込み中... ' + pct.toFixed(0) + '%');
      }
    },
    (err) => {
      console.error(err);
      setStatus('エラー: ' + displayName + ' を読み込めませんでした (' + (err.message || err) + ')');
    }
  );
}

function loadFromFile(file) {
  const url = URL.createObjectURL(file);
  setStatus(file.name + ' を読み込み中...');
  loader.load(
    url,
    (gltf) => {
      URL.revokeObjectURL(url);
      clearModel();
      currentModel = gltf.scene;
      enhanceMaterials(currentModel); // 金属の反射を強化
      scene.add(currentModel);
      frameModel(currentModel);
      setStatus('表示中: ' + file.name);
    },
    undefined,
    (err) => {
      URL.revokeObjectURL(url);
      console.error(err);
      setStatus('エラー: ' + file.name + ' を読み込めませんでした');
    }
  );
}

// --- ファイル選択 ---
fileInput.addEventListener('change', (e) => {
  const file = e.target.files?.[0];
  if (file) loadFromFile(file);
});

// --- ドラッグ&ドロップ ---
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer?.files?.[0];
  if (file && /\.(glb|gltf)$/i.test(file.name)) loadFromFile(file);
});

// --- リサイズ ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- アニメーションループ ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
